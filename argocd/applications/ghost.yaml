apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ghost
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cloud-forge
  source:
    repoURL: https://github.com/denfr18/cloud-forge
    targetRevision: main
    path: charts/ghost
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: stack-ghost
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
