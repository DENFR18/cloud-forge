name: Deploy Monitoring

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-3

jobs:
  monitoring:
    name: Deploy Prometheus & Grafana
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig from SSM
        run: |
          mkdir -p ~/.kube
          aws ssm get-parameter \
            --name "/cloud-forge/k3s-kubeconfig" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ${{ env.AWS_REGION }} > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Helm repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Create monitoring namespace
        run: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Prometheus
        run: |
          helm upgrade --install prometheus prometheus-community/prometheus \
            --namespace monitoring \
            --values monitoring/prometheus/values.yaml \
            --timeout 5m

      - name: Deploy Grafana
        run: |
          helm upgrade --install grafana grafana/grafana \
            --namespace monitoring \
            --values monitoring/grafana/values.yaml \
            --timeout 5m

      - name: Get Grafana credentials
        run: |
          PASSWORD=$(kubectl get secret grafana \
            -n monitoring \
            -o jsonpath="{.data.admin-password}" | base64 --decode)
          MASTER_IP=$(aws ssm get-parameter \
            --name "/cloud-forge/k3s-master-ip" \
            --query "Parameter.Value" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "================================================"
          echo "  MONITORING DEPLOYE"
          echo "================================================"
          echo "  Grafana    : http://$MASTER_IP:30030"
          echo "  Prometheus : http://$MASTER_IP:30090"
          echo ""
          echo "  Grafana login    : admin"
          echo "  Grafana password : $PASSWORD"
