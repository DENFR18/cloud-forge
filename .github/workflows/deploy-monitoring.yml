name: Deploy Monitoring

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-3

jobs:
  monitoring:
    name: Deploy Prometheus & Grafana
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name eks-cloud-forge-prod

      - name: Add Helm repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Create monitoring namespace
        run: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Prometheus
        run: |
          helm upgrade --install prometheus prometheus-community/prometheus \
            --namespace monitoring \
            --values monitoring/prometheus/values.yaml \
            --wait \
            --timeout 5m

      - name: Deploy Grafana
        run: |
          helm upgrade --install grafana grafana/grafana \
            --namespace monitoring \
            --values monitoring/grafana/values.yaml \
            --wait \
            --timeout 5m

      - name: Get Grafana credentials
        run: |
          PASSWORD=$(kubectl get secret grafana \
            -n monitoring \
            -o jsonpath="{.data.admin-password}" | base64 --decode)
          INGRESS_HOST=$(kubectl get svc ingress-nginx-controller \
            -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo "================================================"
          echo "  MONITORING DEPLOYE"
          echo "================================================"
          echo "  Grafana    : http://grafana.$INGRESS_HOST"
          echo "  Prometheus : http://prometheus.$INGRESS_HOST"
          echo ""
          echo "  Grafana login    : admin"
          echo "  Grafana password : $PASSWORD"
