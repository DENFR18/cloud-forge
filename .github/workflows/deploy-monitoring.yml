name: Deploy Monitoring

on:
  workflow_dispatch:

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
  SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
  TF_VERSION: 1.7.0

jobs:
  monitoring:
    name: Deploy Prometheus & Grafana
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        working-directory: terraform
        run: |
          terraform init
          mkdir -p ~/.kube
          terraform output -raw kubeconfig > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Helm repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Create monitoring namespace
        run: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Prometheus
        run: |
          helm upgrade --install prometheus prometheus-community/prometheus \
            --namespace monitoring \
            --values monitoring/prometheus/values.yaml \
            --timeout 5m

      - name: Deploy Grafana
        run: |
          helm upgrade --install grafana grafana/grafana \
            --namespace monitoring \
            --values monitoring/grafana/values.yaml \
            --timeout 5m

      - name: Deploy monitoring ingress
        run: |
          LB_IP=$(kubectl get svc ingress-nginx-controller \
            -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          INGRESS_HOST="${LB_IP}.nip.io"
          sed -i "s|INGRESS_HOST|$INGRESS_HOST|g" monitoring/ingress.yaml
          kubectl apply -f monitoring/ingress.yaml

      - name: Get Grafana credentials
        run: |
          PASSWORD=$(kubectl get secret grafana \
            -n monitoring \
            -o jsonpath="{.data.admin-password}" | base64 --decode)
          LB_IP=$(kubectl get svc ingress-nginx-controller \
            -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          INGRESS_HOST="${LB_IP}.nip.io"
          echo "================================================"
          echo "  MONITORING DEPLOYE"
          echo "================================================"
          echo "  Grafana    : http://grafana.$INGRESS_HOST"
          echo "  Prometheus : http://prometheus.$INGRESS_HOST"
          echo ""
          echo "  Grafana login    : admin"
          echo "  Grafana password : $PASSWORD"
