name: Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action a effectuer sur l'infrastructure"
        required: true
        type: choice
        options:
          - deploy
          - destroy

env:
  AWS_REGION: eu-west-3
  TF_VERSION: 1.7.0

jobs:
  # ─── DEPLOY ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'deploy'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_public_key: ${{ secrets.EC2_SSH_PUBLIC_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_public_key: ${{ secrets.EC2_SSH_PUBLIC_KEY }}

      - name: Wait for k3s master to be ready
        run: |
          echo "Waiting for k3s master to write kubeconfig to SSM..."
          MAX_RETRY=40
          RETRY=0
          KUBECONFIG_VALUE=""

          while [ -z "$KUBECONFIG_VALUE" ] && [ $RETRY -lt $MAX_RETRY ]; do
            KUBECONFIG_VALUE=$(aws ssm get-parameter \
              --name "/cloud-forge/k3s-kubeconfig" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text \
              --region ${{ env.AWS_REGION }} 2>/dev/null || echo "")

            if [ -z "$KUBECONFIG_VALUE" ]; then
              echo "Still waiting... ($RETRY/$MAX_RETRY)"
              sleep 30
              RETRY=$((RETRY + 1))
            fi
          done

          if [ -z "$KUBECONFIG_VALUE" ]; then
            echo "ERROR: k3s master did not become ready in time"
            exit 1
          fi

          echo "k3s master is ready!"

      - name: Verify cluster
        run: |
          mkdir -p ~/.kube
          aws ssm get-parameter \
            --name "/cloud-forge/k3s-kubeconfig" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ${{ env.AWS_REGION }} > ~/.kube/config
          chmod 600 ~/.kube/config

          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

          kubectl get nodes

      - name: Summary
        run: |
          MASTER_IP=$(terraform output -raw master_public_ip)
          echo "================================================"
          echo "  INFRASTRUCTURE DEPLOYEE AVEC SUCCES"
          echo "================================================"
          echo "Master k3s    : $MASTER_IP"
          echo "k3s API       : https://$MASTER_IP:6443"
          echo "ECR node-api  : $(terraform output -raw ecr_node_api_url)"
          echo "ECR flask-api : $(terraform output -raw ecr_flask_api_url)"
          echo "ECR react     : $(terraform output -raw ecr_react_url)"
          echo ""
          echo "Lance maintenant le workflow 'Deploy Apps'."

  # ─── DESTROY ───────────────────────────────────────────────────────────────
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Cleanup SSM Parameters
        run: |
          aws ssm delete-parameter --name "/cloud-forge/k3s-token" --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws ssm delete-parameter --name "/cloud-forge/k3s-master-ip" --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws ssm delete-parameter --name "/cloud-forge/k3s-kubeconfig" --region ${{ env.AWS_REGION }} 2>/dev/null || true
        continue-on-error: true

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        env:
          TF_VAR_public_key: ${{ secrets.EC2_SSH_PUBLIC_KEY }}

      - name: Confirmation
        run: |
          echo "================================================"
          echo "  INFRASTRUCTURE DETRUITE TOTALEMENT"
          echo "================================================"
          echo "VPC, EC2 (master + workers), EIP, ECR, SG..."
          echo "Parametres SSM nettoyes."
          echo ""
          echo "Note : Le bucket S3 tfstate et la table DynamoDB"
          echo "sont conserves pour le prochain deploiement."
