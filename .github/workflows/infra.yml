name: Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action a effectuer sur l'infrastructure"
        required: true
        type: choice
        options:
          - deploy
          - destroy

env:
  TF_VERSION: 1.7.0
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
  SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}

jobs:
  # ─── CHECKOV ────────────────────────────────────────────────────────────────
  checkov:
    name: Checkov – Terraform Security Scan
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'deploy'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan Terraform with Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-infra.sarif
          soft_fail: true

      - name: Upload Terraform SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-infra.sarif
          category: checkov-infra

  # ─── DEPLOY ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: checkov
    if: github.event.inputs.action == 'deploy'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tfstate bucket if needed
        working-directory: .
        run: |
          aws s3api create-bucket \
            --bucket cloud-forge-tfstate \
            --endpoint-url https://s3.fr-par.scw.cloud \
            --region fr-par 2>/dev/null || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export kubeconfig
        run: |
          mkdir -p ~/.kube
          terraform output -raw kubeconfig > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Wait for nodes to be ready
        run: |
          echo "Waiting for nodes..."
          MAX_RETRY=30
          RETRY=0
          while [ $RETRY -lt $MAX_RETRY ]; do
            READY=$(kubectl get nodes --no-headers 2>/dev/null | grep -c " Ready" || echo "0")
            if [ "$READY" -ge 2 ]; then
              echo "All nodes ready!"
              kubectl get nodes
              break
            fi
            echo "Nodes ready: $READY/2 ($RETRY/$MAX_RETRY)"
            sleep 20
            RETRY=$((RETRY + 1))
          done
          if [ "$READY" -lt 2 ]; then
            echo "ERROR: Nodes not ready in time"
            exit 1
          fi

      - name: Summary
        run: |
          echo "================================================"
          echo "  INFRASTRUCTURE DEPLOYEE AVEC SUCCES"
          echo "================================================"
          echo "Cluster ID : $(terraform output -raw cluster_id)"
          echo "API Server : $(terraform output -raw cluster_apiserver_url)"
          echo "Registry   : $(terraform output -raw registry_endpoint)"
          echo ""
          echo "Lance maintenant le workflow 'Deploy Apps'."

  # ─── DESTROY ───────────────────────────────────────────────────────────────
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Confirmation
        run: |
          echo "================================================"
          echo "  INFRASTRUCTURE DETRUITE TOTALEMENT"
          echo "================================================"
          echo "Cluster Kapsule, Pool, Private Network, Registry..."
          echo "supprimees."
