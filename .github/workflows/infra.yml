name: Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action a effectuer sur l'infrastructure"
        required: true
        type: choice
        options:
          - deploy
          - destroy

env:
  AWS_REGION: eu-west-3
  TF_VERSION: 1.7.0

jobs:
  # ─── DEPLOY ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'deploy'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get cluster info
        run: |
          echo "================================================"
          echo "  INFRASTRUCTURE DEPLOYEE AVEC SUCCES"
          echo "================================================"
          echo "Cluster : $(terraform output -raw cluster_name)"
          echo "Endpoint : $(terraform output -raw cluster_endpoint)"
          echo "ECR node-api : $(terraform output -raw ecr_node_api_url)"
          echo "ECR flask-api : $(terraform output -raw ecr_flask_api_url)"
          echo "ECR react : $(terraform output -raw ecr_react_url)"
          echo ""
          echo "Lance maintenant le workflow 'Deploy Apps' pour deployer les applications."

  # ─── DESTROY ───────────────────────────────────────────────────────────────
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment: production  # Necessite confirmation manuelle dans GitHub
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          if [ -n "$CLUSTER" ]; then
            aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name $CLUSTER
            # Supprimer les LoadBalancers avant de detruire l'infra
            kubectl delete svc --all -n ingress-nginx --ignore-not-found=true
            sleep 30
          fi
        continue-on-error: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Confirmation
        run: |
          echo "================================================"
          echo "  INFRASTRUCTURE DETRUITE TOTALEMENT"
          echo "================================================"
          echo "VPC, EKS, ECR, NAT Gateway, Load Balancers..."
          echo "Tout a ete supprime."
          echo ""
          echo "Note : Le bucket S3 tfstate et la table DynamoDB"
          echo "sont conserves (crees via bootstrap.sh)."
