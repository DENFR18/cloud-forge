name: Deploy Apps

on:
  workflow_dispatch:

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
  SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
  TF_VERSION: 1.7.0

permissions:
  contents: read

concurrency:
  group: deploy-apps-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-yaml:
    name: Validate Kubernetes YAML
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run YAML validation
        run: python scripts/validate_yaml.py

  validate-helm:
    name: Lint and template Helm charts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint and template each chart
        run: |
          for chart in charts/*/; do
            echo "=== Linting $chart ==="
            helm lint "$chart"
            echo "=== Templating $chart ==="
            helm template "$chart" >/dev/null
          done

  build-push:
    name: Build, Scan & Push Images to SCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate-yaml, validate-helm]
    permissions:
      contents: read
      security-events: write

    outputs:
      registry: ${{ steps.get-registry.outputs.registry }}
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Get registry endpoint
        id: get-registry
        working-directory: terraform
        run: |
          terraform init
          REGISTRY=$(terraform output -raw registry_endpoint)
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Compute image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Scaleway Container Registry
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          REGISTRY: ${{ steps.get-registry.outputs.registry }}
        run: echo "$SCW_SECRET_KEY" | docker login "$REGISTRY" -u nologin --password-stdin

      - name: Build node-api
        run: |
          docker build \
            -t ${{ steps.get-registry.outputs.registry }}/node-api:${{ steps.tag.outputs.tag }} \
            -t ${{ steps.get-registry.outputs.registry }}/node-api:latest \
            apps/node-api

      - name: Trivy scan – node-api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.get-registry.outputs.registry }}/node-api:${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-node-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Push node-api
        run: |
          docker push ${{ steps.get-registry.outputs.registry }}/node-api:${{ steps.tag.outputs.tag }}
          docker push ${{ steps.get-registry.outputs.registry }}/node-api:latest

      - name: Build flask-api
        run: |
          docker build \
            -t ${{ steps.get-registry.outputs.registry }}/flask-api:${{ steps.tag.outputs.tag }} \
            -t ${{ steps.get-registry.outputs.registry }}/flask-api:latest \
            apps/flask-api

      - name: Trivy scan – flask-api
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.get-registry.outputs.registry }}/flask-api:${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-flask-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Push flask-api
        run: |
          docker push ${{ steps.get-registry.outputs.registry }}/flask-api:${{ steps.tag.outputs.tag }}
          docker push ${{ steps.get-registry.outputs.registry }}/flask-api:latest

      - name: Build react
        run: |
          docker build \
            -t ${{ steps.get-registry.outputs.registry }}/react:${{ steps.tag.outputs.tag }} \
            -t ${{ steps.get-registry.outputs.registry }}/react:latest \
            apps/react

      - name: Trivy scan – react
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.get-registry.outputs.registry }}/react:${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-react.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Push react
        run: |
          docker push ${{ steps.get-registry.outputs.registry }}/react:${{ steps.tag.outputs.tag }}
          docker push ${{ steps.get-registry.outputs.registry }}/react:latest

  deploy:
    name: Sync via ArgoCD
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        working-directory: terraform
        run: |
          terraform init
          mkdir -p ~/.kube
          terraform output -raw kubeconfig > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install NGINX Ingress Controller (idempotent)
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --set controller.admissionWebhooks.enabled=false \
            --set controller.admissionWebhooks.patch.enabled=false \
            --timeout 8m

      - name: Ensure ArgoCD is installed
        run: |
          if ! kubectl get ns argocd >/dev/null 2>&1; then
            echo "ArgoCD not found - run the 'Deploy ArgoCD' workflow first."
            exit 1
          fi
          kubectl apply -f argocd/project.yaml
          kubectl apply -f argocd/root-app.yaml

      - name: Get Load Balancer IP
        id: lb
        run: |
          for i in $(seq 1 30); do
            LB_IP=$(kubectl get svc ingress-nginx-controller \
              -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$LB_IP" ]; then
              echo "ip=$LB_IP" >> $GITHUB_OUTPUT
              echo "host=${LB_IP}.nip.io" >> $GITHUB_OUTPUT
              echo "Load Balancer IP: $LB_IP"
              break
            fi
            sleep 10
          done

      - name: Seed registry pull secrets
        run: |
          REGISTRY="${{ needs.build-push.outputs.registry }}"
          for NS in stack-react stack-node-api stack-flask-api stack-wordpress stack-ghost stack-gitea; do
            kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -
            kubectl create secret docker-registry scr-credentials \
              --docker-server="$REGISTRY" \
              --docker-username=nologin \
              --docker-password="${{ secrets.SCW_SECRET_KEY }}" \
              --namespace="$NS" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Seed MySQL secret for WordPress
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_USER_PASSWORD }}
        run: |
          # If MYSQL_ROOT_PASSWORD / MYSQL_USER_PASSWORD GitHub Secrets are unset,
          # generate strong randoms once - they persist in the cluster Secret across runs.
          if kubectl -n stack-wordpress get secret mysql-secret >/dev/null 2>&1; then
            echo "mysql-secret already exists, leaving it untouched"
            exit 0
          fi
          ROOT_PWD="${MYSQL_ROOT_PASSWORD:-$(openssl rand -base64 24)}"
          USER_PWD="${MYSQL_PASSWORD:-$(openssl rand -base64 24)}"
          kubectl create secret generic mysql-secret \
            --namespace stack-wordpress \
            --from-literal=MYSQL_ROOT_PASSWORD="$ROOT_PWD" \
            --from-literal=MYSQL_PASSWORD="$USER_PWD"

      - name: Install ArgoCD CLI
        run: |
          sudo curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo chmod +x /usr/local/bin/argocd

      - name: Wait for Applications to be created by root app
        run: |
          for app in namespaces node-api flask-api react wordpress ghost gitea; do
            for i in $(seq 1 30); do
              if kubectl -n argocd get application "$app" >/dev/null 2>&1; then
                echo "Application $app exists"
                break
              fi
              echo "Waiting for Application $app..."
              sleep 5
            done
          done

      - name: Override runtime parameters (registry, tag, ingress host)
        env:
          REGISTRY: ${{ needs.build-push.outputs.registry }}
          IMAGE_TAG: ${{ needs.build-push.outputs.tag }}
          INGRESS_HOST: ${{ steps.lb.outputs.host }}
        run: |
          for app in node-api flask-api react; do
            argocd app set "$app" --core \
              -p image.registry="$REGISTRY" \
              -p image.tag="$IMAGE_TAG"
          done
          for app in wordpress ghost gitea; do
            argocd app set "$app" --core \
              -p ingressHost="$INGRESS_HOST"
          done

      - name: Sync all applications
        run: |
          for app in namespaces node-api flask-api react wordpress ghost gitea; do
            argocd app sync "$app" --core --timeout 300
          done

      - name: Wait for healthy status
        run: |
          for app in namespaces node-api flask-api react wordpress ghost gitea; do
            argocd app wait "$app" --core --health --timeout 300
          done

      - name: Summary
        env:
          LB_IP: ${{ steps.lb.outputs.ip }}
          INGRESS_HOST: ${{ steps.lb.outputs.host }}
        run: |
          echo "================================================"
          echo "  APPLICATIONS DEPLOYEES (via ArgoCD)"
          echo "================================================"
          echo "Load Balancer IP : $LB_IP"
          echo "Wildcard DNS     : *.$INGRESS_HOST"
          echo ""
          echo "  Portail    : http://$LB_IP"
          echo "  WordPress  : http://wordpress.$INGRESS_HOST"
          echo "  Ghost      : http://ghost.$INGRESS_HOST"
          echo "  Gitea      : http://gitea.$INGRESS_HOST"
          echo "  Node API   : http://$LB_IP/api"
          echo "  Flask API  : http://$LB_IP/flask"
          echo ""
          echo "  ArgoCD UI : kubectl -n argocd port-forward svc/argocd-server 8080:443"
