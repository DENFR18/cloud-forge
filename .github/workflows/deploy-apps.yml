name: Deploy Apps

on:
  workflow_dispatch:

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
  SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
  TF_VERSION: 1.7.0

permissions:
  contents: read

concurrency:
  group: deploy-apps-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── VALIDATE YAML ─────────────────────────────────────────────────────────
  validate-yaml:
    name: Validate Kubernetes YAML
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run YAML validation
        run: python scripts/validate_yaml.py

  # ─── BUILD, SCAN & PUSH custom images ─────────────────────────────────────
  build-push:
    name: Build, Scan & Push Images to SCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate-yaml
    permissions:
      contents: read
      security-events: write

    outputs:
      registry: ${{ steps.get-registry.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Get registry endpoint
        id: get-registry
        working-directory: terraform
        run: |
          terraform init
          REGISTRY=$(terraform output -raw registry_endpoint)
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Login to Scaleway Container Registry
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          REGISTRY: ${{ steps.get-registry.outputs.registry }}
        run: echo "$SCW_SECRET_KEY" | docker login "$REGISTRY" -u nologin --password-stdin

      # ── node-api ──
      - name: Build node-api
        run: docker build -t ${{ steps.get-registry.outputs.registry }}/node-api:latest apps/node-api

      - name: Trivy scan – node-api
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ steps.get-registry.outputs.registry }}/node-api:latest
          format: sarif
          output: trivy-node-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Push node-api
        run: docker push ${{ steps.get-registry.outputs.registry }}/node-api:latest

      # ── flask-api ──
      - name: Build flask-api
        run: docker build -t ${{ steps.get-registry.outputs.registry }}/flask-api:latest apps/flask-api

      - name: Trivy scan – flask-api
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ steps.get-registry.outputs.registry }}/flask-api:latest
          format: sarif
          output: trivy-flask-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Push flask-api
        run: docker push ${{ steps.get-registry.outputs.registry }}/flask-api:latest

      # ── react ──
      - name: Build react
        run: docker build -t ${{ steps.get-registry.outputs.registry }}/react:latest apps/react

      - name: Trivy scan – react
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ steps.get-registry.outputs.registry }}/react:latest
          format: sarif
          output: trivy-react.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Push react
        run: docker push ${{ steps.get-registry.outputs.registry }}/react:latest

      # ── Upload SARIF reports ──
      - name: Upload Trivy SARIF – node-api
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-node-api.sarif
          category: trivy-node-api

      - name: Upload Trivy SARIF – flask-api
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-flask-api.sarif
          category: trivy-flask-api

      - name: Upload Trivy SARIF – react
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-react.sarif
          category: trivy-react

  # ─── DEPLOY to Kapsule ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kapsule
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        working-directory: terraform
        run: |
          terraform init
          mkdir -p ~/.kube
          terraform output -raw kubeconfig > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --set controller.admissionWebhooks.enabled=false \
            --set controller.admissionWebhooks.patch.enabled=false \
            --timeout 8m

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces/

      - name: Create registry secret for all app namespaces
        run: |
          REGISTRY="${{ needs.build-push.outputs.registry }}"
          for NS in stack-react stack-node-api stack-flask-api stack-wordpress stack-ghost stack-gitea; do
            kubectl create secret docker-registry scr-credentials \
              --docker-server="$REGISTRY" \
              --docker-username=nologin \
              --docker-password="${{ secrets.SCW_SECRET_KEY }}" \
              --namespace="$NS" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Get Load Balancer IP
        id: lb
        run: |
          echo "Waiting for Load Balancer IP..."
          for i in $(seq 1 30); do
            LB_IP=$(kubectl get svc ingress-nginx-controller \
              -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$LB_IP" ]; then
              echo "ip=$LB_IP" >> $GITHUB_OUTPUT
              echo "host=${LB_IP}.nip.io" >> $GITHUB_OUTPUT
              echo "Load Balancer IP: $LB_IP"
              break
            fi
            sleep 10
          done

      - name: Deploy apps
        env:
          SCR_REGISTRY: ${{ needs.build-push.outputs.registry }}
          INGRESS_HOST: ${{ steps.lb.outputs.host }}
        run: |
          sed -i "s|ECR_REGISTRY|$SCR_REGISTRY|g" k8s/node-api/stack.yaml
          sed -i "s|ECR_REGISTRY|$SCR_REGISTRY|g" k8s/flask-api/stack.yaml
          sed -i "s|ECR_REGISTRY|$SCR_REGISTRY|g" k8s/react/stack.yaml
          sed -i "s|INGRESS_HOST|$INGRESS_HOST|g" k8s/wordpress/ingress.yaml
          sed -i "s|INGRESS_HOST|$INGRESS_HOST|g" k8s/ghost/ingress.yaml
          sed -i "s|INGRESS_HOST|$INGRESS_HOST|g" k8s/ghost/stack.yaml
          sed -i "s|INGRESS_HOST|$INGRESS_HOST|g" k8s/gitea/ingress.yaml

          kubectl apply -f k8s/wordpress/
          kubectl apply -f k8s/ghost/
          kubectl apply -f k8s/gitea/
          kubectl apply -f k8s/node-api/
          kubectl apply -f k8s/flask-api/
          kubectl apply -f k8s/react/

      - name: Restart custom image deployments
        run: |
          kubectl rollout restart deployment/react -n stack-react
          kubectl rollout restart deployment/node-api -n stack-node-api
          kubectl rollout restart deployment/flask-api -n stack-flask-api
          kubectl rollout status deployment/react -n stack-react --timeout=180s
          kubectl rollout status deployment/node-api -n stack-node-api --timeout=180s
          kubectl rollout status deployment/flask-api -n stack-flask-api --timeout=180s

      - name: Summary
        env:
          LB_IP: ${{ steps.lb.outputs.ip }}
          INGRESS_HOST: ${{ steps.lb.outputs.host }}
        run: |
          echo "================================================"
          echo "  APPLICATIONS DEPLOYEES"
          echo "================================================"
          echo "Load Balancer IP : $LB_IP"
          echo "Wildcard DNS     : *.$INGRESS_HOST"
          echo ""
          echo "  Portail    : http://$LB_IP"
          echo "  WordPress  : http://wordpress.$INGRESS_HOST"
          echo "  Ghost      : http://ghost.$INGRESS_HOST"
          echo "  Gitea      : http://gitea.$INGRESS_HOST"
          echo "  Node API   : http://$LB_IP/api"
          echo "  Flask API  : http://$LB_IP/flask"
