name: Deploy Apps

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-3

jobs:
  # ─── BUILD & PUSH custom images ────────────────────────────────────────────
  build-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push node-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/cloud-forge/node-api:latest apps/node-api
          docker push $ECR_REGISTRY/cloud-forge/node-api:latest

      - name: Build & push flask-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/cloud-forge/flask-api:latest apps/flask-api
          docker push $ECR_REGISTRY/cloud-forge/flask-api:latest

      - name: Build & push react
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/cloud-forge/react:latest apps/react
          docker push $ECR_REGISTRY/cloud-forge/react:latest

  # ─── DEPLOY to k3s ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig from SSM
        run: |
          mkdir -p ~/.kube
          aws ssm get-parameter \
            --name "/cloud-forge/k3s-kubeconfig" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ${{ env.AWS_REGION }} > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Get ECR registry
        id: ecr
        run: |
          REGISTRY=$(aws ecr describe-repositories \
            --repository-names cloud-forge/node-api \
            --query 'repositories[0].repositoryUri' \
            --output text | cut -d'/' -f1)
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces/

      - name: Deploy apps
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          # Remplace les placeholders ECR dans les manifestes
          sed -i "s|ECR_REGISTRY|$ECR_REGISTRY|g" k8s/node-api/stack.yaml
          sed -i "s|ECR_REGISTRY|$ECR_REGISTRY|g" k8s/flask-api/stack.yaml
          sed -i "s|ECR_REGISTRY|$ECR_REGISTRY|g" k8s/react/stack.yaml

          kubectl apply -f k8s/wordpress/
          kubectl apply -f k8s/ghost/
          kubectl apply -f k8s/gitea/
          kubectl apply -f k8s/node-api/
          kubectl apply -f k8s/flask-api/
          kubectl apply -f k8s/react/


      - name: Get ingress endpoint
        run: |
          MASTER_IP=$(aws ssm get-parameter \
            --name "/cloud-forge/k3s-master-ip" \
            --query "Parameter.Value" \
            --output text \
            --region ${{ env.AWS_REGION }})
          NODE_PORT=$(kubectl get svc ingress-nginx-controller \
            -n ingress-nginx \
            -o jsonpath='{.spec.ports[?(@.name=="http")].nodePort}')
          echo "================================================"
          echo "  APPLICATIONS DEPLOYEES"
          echo "================================================"
          echo "Master IP  : $MASTER_IP"
          echo "NodePort   : $NODE_PORT"
          echo ""
          echo "  WordPress  : http://$MASTER_IP:$NODE_PORT"
          echo "  Ghost      : http://$MASTER_IP:$NODE_PORT"
          echo "  Gitea      : http://$MASTER_IP:$NODE_PORT"
          echo "  Node API   : http://$MASTER_IP:$NODE_PORT/api"
          echo "  Flask API  : http://$MASTER_IP:$NODE_PORT/flask"
          echo "  React      : http://$MASTER_IP:$NODE_PORT"
          echo "  Portal     : http://$MASTER_IP:$NODE_PORT"
