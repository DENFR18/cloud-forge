name: Deploy Apps

on:
  workflow_dispatch:

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
  SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
  TF_VERSION: 1.7.0

jobs:
  # ─── BUILD & PUSH custom images ────────────────────────────────────────────
  build-push:
    name: Build & Push Images to SCR
    runs-on: ubuntu-latest

    outputs:
      registry: ${{ steps.get-registry.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Get registry endpoint
        id: get-registry
        working-directory: terraform
        run: |
          terraform init
          REGISTRY=$(terraform output -raw registry_endpoint)
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Login to Scaleway Container Registry
        run: docker login ${{ steps.get-registry.outputs.registry }} -u nologin --password-stdin <<< "${{ secrets.SCW_SECRET_KEY }}"

      - name: Build & push node-api
        run: |
          docker build -t ${{ steps.get-registry.outputs.registry }}/node-api:latest apps/node-api
          docker push ${{ steps.get-registry.outputs.registry }}/node-api:latest

      - name: Build & push flask-api
        run: |
          docker build -t ${{ steps.get-registry.outputs.registry }}/flask-api:latest apps/flask-api
          docker push ${{ steps.get-registry.outputs.registry }}/flask-api:latest

      - name: Build & push react
        run: |
          docker build -t ${{ steps.get-registry.outputs.registry }}/react:latest apps/react
          docker push ${{ steps.get-registry.outputs.registry }}/react:latest

  # ─── DEPLOY to Kapsule ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kapsule
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        working-directory: terraform
        run: |
          terraform init
          mkdir -p ~/.kube
          terraform output -raw kubeconfig > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --set controller.admissionWebhooks.enabled=false \
            --set controller.admissionWebhooks.patch.enabled=false \
            --timeout 8m

      - name: Create registry secret for all namespaces
        run: |
          REGISTRY="${{ needs.build-push.outputs.registry }}"
          for NS in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}'); do
            kubectl create secret docker-registry scr-credentials \
              --docker-server="$REGISTRY" \
              --docker-username=nologin \
              --docker-password="${{ secrets.SCW_SECRET_KEY }}" \
              --namespace="$NS" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Apply namespaces
        run: kubectl apply -f k8s/namespaces/

      - name: Create registry secret for app namespaces
        run: |
          REGISTRY="${{ needs.build-push.outputs.registry }}"
          for NS in $(kubectl get ns -l type=tenant -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo ""); do
            kubectl create secret docker-registry scr-credentials \
              --docker-server="$REGISTRY" \
              --docker-username=nologin \
              --docker-password="${{ secrets.SCW_SECRET_KEY }}" \
              --namespace="$NS" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Deploy apps
        env:
          SCR_REGISTRY: ${{ needs.build-push.outputs.registry }}
        run: |
          sed -i "s|ECR_REGISTRY|$SCR_REGISTRY|g" k8s/node-api/stack.yaml
          sed -i "s|ECR_REGISTRY|$SCR_REGISTRY|g" k8s/flask-api/stack.yaml
          sed -i "s|ECR_REGISTRY|$SCR_REGISTRY|g" k8s/react/stack.yaml

          kubectl apply -f k8s/wordpress/
          kubectl apply -f k8s/ghost/
          kubectl apply -f k8s/gitea/
          kubectl apply -f k8s/node-api/
          kubectl apply -f k8s/flask-api/
          kubectl apply -f k8s/react/

      - name: Summary
        run: |
          LB_IP=$(kubectl get svc ingress-nginx-controller \
            -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          echo "================================================"
          echo "  APPLICATIONS DEPLOYEES"
          echo "================================================"
          echo "Load Balancer IP : $LB_IP"
          echo ""
          echo "  WordPress  : http://$LB_IP"
          echo "  Ghost      : http://$LB_IP"
          echo "  Gitea      : http://$LB_IP"
          echo "  Node API   : http://$LB_IP/api"
          echo "  Flask API  : http://$LB_IP/flask"
          echo "  React      : http://$LB_IP"
