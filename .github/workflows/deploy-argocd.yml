name: Deploy ArgoCD

on:
  workflow_dispatch:

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
  SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
  TF_VERSION: 1.7.0

permissions:
  contents: read

concurrency:
  group: deploy-argocd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  install-argocd:
    name: Install ArgoCD and bootstrap root app
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        working-directory: terraform
        run: |
          terraform init
          mkdir -p ~/.kube
          terraform output -raw kubeconfig > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install NGINX Ingress Controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --set controller.admissionWebhooks.enabled=false \
            --set controller.admissionWebhooks.patch.enabled=false \
            --timeout 8m

      - name: Wait for Load Balancer IP
        id: lb
        run: |
          for i in $(seq 1 30); do
            LB_IP=$(kubectl get svc ingress-nginx-controller \
              -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$LB_IP" ]; then
              echo "ip=$LB_IP" >> $GITHUB_OUTPUT
              echo "host=${LB_IP}.nip.io" >> $GITHUB_OUTPUT
              echo "Load Balancer IP: $LB_IP"
              break
            fi
            echo "Waiting for Load Balancer IP..."
            sleep 10
          done

      - name: Install ArgoCD via Helm with public Ingress
        env:
          ARGOCD_HOST: argocd.${{ steps.lb.outputs.host }}
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --values argocd/install/values.yaml \
            --set server.ingress.hostname="$ARGOCD_HOST" \
            --set "server.ingress.extraTls[0].hosts[0]=$ARGOCD_HOST" \
            --timeout 10m \
            --wait

      - name: Apply AppProject
        run: kubectl apply -f argocd/project.yaml

      - name: Bootstrap root Application (app-of-apps)
        run: kubectl apply -f argocd/root-app.yaml

      - name: Wait for ArgoCD applications to register
        run: |
          for i in $(seq 1 30); do
            COUNT=$(kubectl -n argocd get applications --no-headers 2>/dev/null | wc -l)
            if [ "$COUNT" -ge 7 ]; then
              echo "All applications registered: $COUNT"
              break
            fi
            echo "Applications registered so far: $COUNT (waiting for >= 7)"
            sleep 10
          done
          kubectl -n argocd get applications

      - name: Summary
        env:
          ARGOCD_URL: http://argocd.${{ steps.lb.outputs.host }}
        run: |
          echo "================================================"
          echo "  ArgoCD installed and exposed publicly."
          echo "================================================"
          echo "  URL  : $ARGOCD_URL"
          echo "  User : admin"
          echo -n "  Pass : "
          kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath='{.data.password}' | base64 -d
          echo ""
          echo "================================================"
