name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── SONARCLOUD ─────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud – Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─── CHECKOV ────────────────────────────────────────────────────────────────
  checkov:
    name: Checkov – IaC Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov --quiet

      - name: Scan Terraform
        run: checkov -d terraform/ --framework terraform --output sarif --soft-fail > checkov-terraform.sarif || true

      - name: Scan Helm charts
        run: checkov -d charts/ --framework helm --output sarif --soft-fail > checkov-k8s.sarif || true

      - name: Scan Dockerfiles
        run: checkov -d apps/ --framework dockerfile --output sarif --soft-fail > checkov-dockerfiles.sarif || true

      - name: Upload Terraform SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-terraform

      - name: Upload Kubernetes SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-k8s.sarif
          category: checkov-kubernetes

      - name: Upload Dockerfiles SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-dockerfiles.sarif
          category: checkov-dockerfiles
