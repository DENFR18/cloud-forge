server:
  persistentVolume:
    size: 8Gi
  retention: "15d"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
  prefixURL: "/prometheus"
  baseURL: "/prometheus/"
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$1
    hosts:
      - ""
    path: /prometheus/?(.*)
    pathType: ImplementationSpecific

alertmanager:
  enabled: false

pushgateway:
  enabled: false

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false
